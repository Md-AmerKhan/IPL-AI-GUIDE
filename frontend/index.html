<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL AI Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
width:900px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 8px 32px rgba(0,0,0,0.4);
color:white;
text-align:center;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:30px;
}

.search-box{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:25px;
}

input{
width:60%;
padding:15px;
border-radius:12px;
border:none;
font-size:16px;
outline:none;
}

button{
padding:15px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff4e50,#f9d423);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.answer-box{
margin-top:25px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.1);
min-height:60px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.card{
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:10px;
}

.footer{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>🏏 IPL AI Guide</h1>
<p class="subtitle">Ask anything about the Indian Premier League</p>

<div class="search-box">

<input id="question" placeholder="Ask about players, teams, matches...">

<button onclick="ask()">Ask</button>

</div>

<div class="answer-box" id="answer">
Your answer will appear here...
</div>

<div class="cards">

<div class="card">
<h3>Players</h3>
<p>Ask about players like Rohit Sharma or Virat Kohli.</p>
</div>

<div class="card">
<h3>Teams</h3>
<p>Find information about IPL teams and squads.</p>
</div>

<div class="card">
<h3>Matches</h3>
<p>Get upcoming match schedules instantly.</p>
</div>

</div>

<div class="footer">
Powered by your IPL AI API
</div>

</div>

<script>

async function ask(){

let q=document.getElementById("question").value;

let url="https://iplguide-ai.onrender.com/ask?q="+encodeURIComponent(q);

let res=await fetch(url);

let data=await res.json();

if(data.answer){
document.getElementById("answer").innerText=data.answer;
}else{
document.getElementById("answer").innerText="No answer found.";
}

}

</script>

</body>
</html>
